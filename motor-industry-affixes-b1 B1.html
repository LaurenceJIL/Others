

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1 English Quiz: Technical Affixes in the Motor Industry</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --text-color: #333333;
            --border-color: #dcdde1;
            --success-color: #2ed573;
            --wrong-color: #ff4757;
            --card-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: var(--container-bg);
            max-width: 700px;
            width: 100%;
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            border-top: 8px solid var(--primary-color);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin: 0 0 10px 0;
        }

        .header p {
            color: #7f8c8d;
            margin: 0;
            font-size: 14px;
        }

        .progress-bar-container {
            background-color: var(--border-color);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-card {
            display: none;
        }

        .question-card.active {
            display: block;
        }

        .question-number {
            font-weight: bold;
            color: var(--accent-color);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0 0 25px 0;
        }

        .option-item {
            background: #f8f9fa;
            border: 2px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            display: flex;
            align-items: center;
        }

        .option-item:hover {
            border-color: var(--primary-color);
            background-color: #f1f2f6;
        }

        .option-item.selected {
            border-color: var(--primary-color);
            background-color: #e8f0fe;
            font-weight: 500;
        }

        /* Interactive Drag/Drop Select Style Styling */
        .dd-select {
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 6px;
            border: 2px solid var(--primary-color);
            background-color: #fff;
            color: var(--primary-color);
            font-weight: bold;
            cursor: pointer;
            margin: 0 5px;
        }

        .feedback-box {
            display: none;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            line-height: 1.5;
            font-size: 14px;
        }

        .feedback-box.correct {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback-box.wrong {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #1a252f;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen.active {
            display: block;
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 20px 0;
        }

        .summary-text {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h1>Motor Industry English Quiz</h1>
        <p>B1 Level: Technical Word Building (Prefixes & Suffixes)</p>
    </div>

    <div class="progress-bar-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="quiz-body">
        <!-- Questions injected dynamically by JavaScript -->
    </div>

    <div class="nav-buttons" id="nav-buttons">
        <button id="prev-btn" class="btn-primary" onclick="changeQuestion(-1)" disabled>Previous</button>
        <button id="next-btn" class="btn-primary" onclick="handleNextClick()">Check Answer</button>
    </div>

    <div class="results-screen" id="results-screen">
        <h2>Quiz Completed!</h2>
        <div class="score-display" id="score-text">0 / 20</div>
        <p class="summary-text" id="summary-text"></p>
        <button class="btn-primary" onclick="window.location.reload()">Restart Quiz</button>
    </div>
</div>

<script>
    const questions = [
  {
    "type": "mc",
    "question": "Many modern SUVs are equipped with _______________ four-wheel-drive systems that engage automatically when loss of traction is detected.",
    "options": [
      "reactive",
      "interactive",
      "proactive",
      "inactive"
    ],
    "answer": "proactive",
    "explanation": "The prefix 'pro-' means forward or before. A 'proactive' system acts in advance to anticipate a situation, rather than just responding to it."
  },
  {
    "type": "tf",
    "question": "If an engineer wants to 'demagnetize' a tool, the prefix 'de-' means they want to increase its magnetic strength.",
    "answer": "False",
    "explanation": "The prefix 'de-' means 'remove', 'reverse', or 'reduce'. To 'demagnetize' means to remove the magnetic properties from an object.",
    "options": [
      "True",
      "False"
    ]
  },
  {
    "type": "mc",
    "question": "The heavy-duty truck chassis was _______________ with high-strength carbon fibers to increase its towing capacity.",
    "options": [
      "deforced",
      "unforced",
      "enforced",
      "reinforced"
    ],
    "answer": "reinforced",
    "explanation": "The prefix 're-' means again, and 'en-' means to cause to be. To 'reinforce' means to strengthen an existing structure with additional material."
  },
  {
    "type": "mc",
    "question": "The alloy wheel was rejected by quality control because it was _______________, failing to form a perfect circle.",
    "options": [
      "unsymmetrical",
      "dissymmetrical",
      "asymmetrical",
      "bisymmetrical"
    ],
    "answer": "asymmetrical",
    "explanation": "The prefix 'a-' means 'not' or 'without'. An 'asymmetrical' shape lacks symmetry or balance."
  },
  {
    "type": "mc",
    "question": "To ensure driver safety, the passenger cabin must be completely _______________ from the fuel tank compartment.",
    "options": [
      "interconnected",
      "integrated",
      "insulated",
      "isolated"
    ],
    "answer": "isolated",
    "explanation": "The word 'isolated' (from Latin 'insula' meaning island) means placed apart or alone. In engineering, it means physically separating components to prevent hazards."
  },
  {
    "type": "tf",
    "question": "If a component is described as 'substandard', the prefix 'sub-' means that its quality is higher than the regular standard.",
    "answer": "False",
    "explanation": "The prefix 'sub-' means 'under' or 'below'. Therefore, 'substandard' means below the required or expected standard.",
    "options": [
      "True",
      "False"
    ]
  },
  {
    "type": "tf",
    "question": "In the term 'biodegradable upholstery', the prefix 'bio-' indicates that the material is made using electricity.",
    "answer": "False",
    "explanation": "The prefix 'bio-' means life or living organisms. Electricity is represented by the prefix 'electro-'.",
    "options": [
      "True",
      "False"
    ]
  },
  {
    "type": "mc",
    "question": "The engineers added a chemical _______________ to the rubber compound to prevent the tires from hardening in freezing temperatures.",
    "options": [
      "stabilizer",
      "stability",
      "stabilizing",
      "stabilize"
    ],
    "answer": "stabilizer",
    "explanation": "The suffix '-er' or '-izer' indicates a agent, device, or substance that performs a specific action. A 'stabilizer' is something that keeps things stable."
  },
  {
    "type": "mc",
    "question": "Engine oil loses its effectiveness if it undergoes _______________ decomposition due to extreme engine heat.",
    "options": [
      "hydro",
      "baro",
      "thermal",
      "chrono"
    ],
    "answer": "thermal",
    "explanation": "The root 'therm-' or 'thermal' relates to heat. 'Thermal decomposition' is the breakdown of a substance caused by heat."
  },
  {
    "type": "tf",
    "question": "The suffix '-ive' in words like 'conductive' or 'corrosive' is typically used to turn a verb or noun into an adjective that describes a tendency or function.",
    "answer": "True",
    "explanation": "The suffix '-ive' means 'having the nature of' or 'tending to', which creates adjectives describing behavior or characteristics.",
    "options": [
      "True",
      "False"
    ]
  },
  {
    "type": "dd",
    "question": "Match the affix to its motor industry meaning: '______-cylinder' (an engine configuration containing more than two or three cylinders)",
    "options": [
      "auto",
      "bio",
      "mous",
      "ive",
      "multi"
    ],
    "answer": "multi",
    "explanation": "The prefix 'multi-' means many or more than one. A 'multi-cylinder' engine has multiple combustion chambers."
  },
  {
    "type": "mc",
    "question": "The vehicle's _______________ safety features, like adaptive cruise control, function independently without driver input.",
    "options": [
      "semiautonomous",
      "nonautonomous",
      "automotive",
      "autonomous"
    ],
    "answer": "autonomous",
    "explanation": "The prefix 'auto-' means self, and '-mous' (from -onomous) means having the law of or acting independently. Thus, 'autonomous' means self-governing or functioning independently."
  },
  {
    "type": "dd",
    "question": "Match the affix to its motor industry meaning: '______-mous' (acting independently, as in self-driving cars)",
    "options": [
      "auto",
      "bio",
      "mous",
      "ive",
      "multi"
    ],
    "answer": "mous",
    "explanation": "The suffix '-mous' or '-onomous' refers to autonomous behavior, meaning self-governing or independent functioning."
  },
  {
    "type": "mc",
    "question": "Steel is heavily treated to make it _______________ to rust, ensuring the chassis lasts for decades.",
    "options": [
      "resistive",
      "resisted",
      "resistance",
      "resistant"
    ],
    "answer": "resistant",
    "explanation": "The suffix '-ant' is used to form adjectives characterizing a state or capability. 'Resistant' means able to withstand or oppose something."
  },
  {
    "type": "tf",
    "question": "The word 'combustible' uses the suffix '-ible', which means 'able to be' or 'capable of being' burned.",
    "answer": "True",
    "explanation": "The suffixes '-able' and '-ible' both mean 'capable of' or 'suitable for'. 'Combustible' means capable of catching fire and burning.",
    "options": [
      "True",
      "False"
    ]
  },
  {
    "type": "mc",
    "question": "Manufacturers are replacing synthetic polymers with _______________ plastics made from agricultural waste to improve sustainability.",
    "options": [
      "hydroplastics",
      "macroplastics",
      "bioplastics",
      "thermoplastics"
    ],
    "answer": "bioplastics",
    "explanation": "The prefix 'bio-' means life or living organisms. 'Bioplastics' are plastic materials produced from renewable biomass sources."
  },
  {
    "type": "dd",
    "question": "Match the affix to its motor industry meaning: '______-fuel' (a biological fuel source like ethanol derived from corn)",
    "options": [
      "auto",
      "bio",
      "mous",
      "ive",
      "multi"
    ],
    "answer": "bio",
    "explanation": "The prefix 'bio-' represents organic, living matter. 'Biofuel' is fuel derived directly from living or recently living matter."
  },
  {
    "type": "dd",
    "question": "Match the affix to its motor industry meaning: 'protect-______' (having the quality of preventing damage or wear)",
    "options": [
      "auto",
      "bio",
      "mous",
      "ive",
      "multi"
    ],
    "answer": "ive",
    "explanation": "The suffix '-ive' transforms the verb 'protect' into the adjective 'protective', describing something that provides protection."
  },
  {
    "type": "mc",
    "question": "The factory uses advanced _______________ to assemble engines quickly and with microscopic precision.",
    "options": [
      "automat",
      "automotive",
      "automate",
      "automation"
    ],
    "answer": "automation",
    "explanation": "The suffix '-ation' changes a verb into a noun representing an action, state, or process. 'Automation' is the process of making something automatic."
  },
  {
    "type": "dd",
    "question": "Match the affix to its motor industry meaning: '______-motive' (relating to motor vehicles and the industry surrounding them)",
    "options": [
      "auto",
      "bio",
      "mous",
      "ive",
      "multi"
    ],
    "answer": "auto",
    "explanation": "The prefix 'auto-' means self. 'Automotive' relates to self-propelled vehicles."
  }
];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let checkedAnswers = new Array(questions.length).fill(false);

    const quizBody = document.getElementById('quiz-body');
    const progressBar = document.getElementById('progress-bar');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const navButtonsBlock = document.getElementById('nav-buttons');
    const progressContainer = document.getElementById('progress-container');
    const resultsScreen = document.getElementById('results-screen');

    function renderQuiz() {
        quizBody.innerHTML = '';
        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = `question-card ${idx === currentIdx ? 'active' : ''}`;
            card.id = `q-card-${idx}`;

            const qNum = document.createElement('div');
            qNum.className = 'question-number';
            qNum.innerText = `Question ${idx + 1} of ${questions.length}`;
            card.appendChild(qNum);

            const qText = document.createElement('div');
            qText.className = 'question-text';

            if(q.type === 'dd') {
                // Standardize drag-and-drop as interactive inline drop-down lists
                let textWithDrop = q.question.replace('______', `<select class="dd-select" id="select-${idx}" onchange="selectDDAnswer(${idx}, this.value)" ${checkedAnswers[idx] ? 'disabled' : ''}><option value="">-- Choose --</option>${q.options.map(o => `<option value="${o}" ${userAnswers[idx] === o ? 'selected' : ''}>${o}</option>`).join('')}</select>`);
                qText.innerHTML = textWithDrop;
            } else {
                qText.innerText = q.question;
            }
            card.appendChild(qText);

            if(q.type !== 'dd') {
                const optionsList = document.createElement('ul');
                optionsList.className = 'options-list';

                q.options.forEach(opt => {
                    const li = document.createElement('li');
                    li.className = `option-item ${userAnswers[idx] === opt ? 'selected' : ''}`;
                    li.innerText = opt;
                    if(!checkedAnswers[idx]) {
                        li.onclick = () => selectAnswer(idx, opt);
                    }
                    optionsList.appendChild(li);
                });
                card.appendChild(optionsList);
            }

            const feedback = document.createElement('div');
            feedback.id = `feedback-${idx}`;
            feedback.className = 'feedback-box';
            if(checkedAnswers[idx]) {
                const isCorrect = userAnswers[idx] === q.answer;
                feedback.className = `feedback-box ${isCorrect ? 'correct' : 'wrong'}`;
                feedback.innerHTML = isCorrect ? 
                    `<strong>Correct!</strong> ${q.explanation}` : 
                    `<strong>Incorrect.</strong> The correct answer is: <strong>${q.answer}</strong>.<br>${q.explanation}`;
            }
            card.appendChild(feedback);

            quizBody.appendChild(card);
        });

        updateUI();
    }

    function selectAnswer(qIdx, selectedValue) {
        userAnswers[qIdx] = selectedValue;
        const card = document.getElementById(`q-card-${qIdx}`);
        const items = card.querySelectorAll('.option-item');
        items.forEach(item => {
            if(item.innerText === selectedValue) {
                item.classList.add('selected');
            } else {
                item.classList.remove('selected');
            }
        });
        nextBtn.disabled = false;
    }

    function selectDDAnswer(qIdx, selectedValue) {
        if(selectedValue === "") {
            userAnswers[qIdx] = null;
            nextBtn.disabled = true;
        } else {
            userAnswers[qIdx] = selectedValue;
            nextBtn.disabled = false;
        }
    }

    function updateUI() {
        progressBar.style.width = `${((currentIdx) / questions.length) * 100}%`;
        prevBtn.disabled = currentIdx === 0;
        
        if (checkedAnswers[currentIdx]) {
            nextBtn.innerText = currentIdx === questions.length - 1 ? 'Finish' : 'Next';
            nextBtn.disabled = false;
        } else {
            nextBtn.innerText = 'Check Answer';
            nextBtn.disabled = !userAnswers[currentIdx];
        }
    }

    function handleNextClick() {
        if (!checkedAnswers[currentIdx]) {
            // Lock and check the answer
            checkedAnswers[currentIdx] = true;
            renderQuiz();
        } else {
            // Move forward
            if (currentIdx === questions.length - 1) {
                showResults();
            } else {
                currentIdx++;
                renderQuiz();
            }
        }
    }

    function changeQuestion(dir) {
        currentIdx += dir;
        renderQuiz();
    }

    function showResults() {
        quizBody.style.display = 'none';
        navButtonsBlock.style.display = 'none';
        progressContainer.style.display = 'none';
        
        let score = 0;
        userAnswers.forEach((ans, idx) => {
            if(ans === questions[idx].answer) score++;
        });

        resultsScreen.classList.add('active');
        document.getElementById('score-text').innerText = `${score} / ${questions.length}`;
        
        let feedbackMessage = "";
        if(score === questions.length) {
            feedbackMessage = "Excellent! You have mastered word-building prefixes and suffixes for the automotive industry!";
        } else if(score >= 14) {
            feedbackMessage = "Great job! You have a solid grasp of motor industry technical terminology and affixes.";
        } else if(score >= 10) {
            feedbackMessage = "Good effort. Review the explanations to better understand how prefixes and suffixes change words.";
        } else {
            feedbackMessage = "Keep practicing! Word-building structures are essential for discussing engineering and automotive tech.";
        }
        document.getElementById('summary-text').innerText = feedbackMessage;
    }

    // Initial load
    renderQuiz();
</script>

</body>
</html>
