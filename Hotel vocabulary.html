
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Vocabulary Drag & Drop</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
      font-size: 1.5em;
    }

    #exercise {
      display: flex;
      flex: 1;
      gap: 20px;
      padding: 10px 20px;
      overflow: hidden;
    }

    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      gap: 10px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f9f9f9;
    }

    .definition {
      background-color: #f0f0f0;
      padding: 8px;
      border: 2px dashed #ccc;
      border-radius: 6px;
      min-height: 50px;
      font-size: 0.9em;
    }

    .definition.correct {
      background-color: #d4edda;
      border-color: green;
    }

    .definition.incorrect {
      background-color: #f8d7da;
      border-color: red;
    }

    .answer {
      padding: 8px;
      background-color: #e0e0ff;
      border: 1px solid #888;
      border-radius: 6px;
      cursor: grab;
      font-size: 0.9em;
      text-align: center;
    }

    #controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-top: 1px solid #ccc;
      background: #f1f1f1;
    }

    button {
      padding: 6px 12px;
      font-size: 0.9em;
      cursor: pointer;
    }

    #score {
      font-weight: bold;
      font-size: 1em;
    }

  </style>
</head>
<body>

<h1>Hotel Vocabulary: Drag & Drop</h1>

<div id="exercise">
  <div class="column" id="definitions"></div>
  <div class="column" id="answers"></div>
</div>

<div id="controls">
  <button onclick="resetExercise()">Reset</button>
  <div id="score">Score: 0/12</div>
</div>

<!-- Sounds -->
<audio id="chime" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="buzzer" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
  const vocab = [
    { word: "reservation", definition: "An arrangement to have a room kept for you at a hotel." },
    { word: "reception", definition: "The area where guests are welcomed and checked in." },
    { word: "check-in", definition: "The process of registering and getting your room key." },
    { word: "check-out", definition: "The process of leaving and paying at the end of your stay." },
    { word: "lobby", definition: "A large open area at the entrance of a hotel." },
    { word: "suite", definition: "A large hotel room with separate areas, often luxurious." },
    { word: "concierge", definition: "A person who helps guests with information and services." },
    { word: "key card", definition: "A plastic card used to unlock your hotel room." },
    { word: "vacancy", definition: "An available room in a hotel." },
    { word: "room service", definition: "Food and drink delivered to your hotel room." },
    { word: "amenities", definition: "Extra features like a gym, pool, or Wi-Fi at a hotel." },
    { word: "housekeeping", definition: "Staff responsible for cleaning and maintaining hotel rooms." },
  ];

  let score = 0;

  function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
  }

  function createExercise() {
    const definitionsDiv = document.getElementById("definitions");
    const answersDiv = document.getElementById("answers");

    definitionsDiv.innerHTML = "";
    answersDiv.innerHTML = "";
    score = 0;
    updateScore();

    const shuffledAnswers = shuffle([...vocab]);

    vocab.forEach(item => {
      const defBox = document.createElement("div");
      defBox.className = "definition";
      defBox.textContent = item.definition;
      defBox.dataset.answer = item.word;
      defBox.ondragover = e => e.preventDefault();
      defBox.ondrop = e => handleDrop(e, defBox);
      definitionsDiv.appendChild(defBox);
    });

    shuffledAnswers.forEach(item => {
      const answer = document.createElement("div");
      answer.className = "answer";
      answer.draggable = true;
      answer.textContent = item.word;
      answer.id = "drag-" + item.word;
      answer.ondragstart = e => e.dataTransfer.setData("text/plain", item.word);
      answersDiv.appendChild(answer);
    });
  }

  function handleDrop(e, defBox) {
    const draggedWord = e.dataTransfer.getData("text/plain");
    const correctWord = defBox.dataset.answer;

    defBox.textContent = correctWord + ": " + defBox.textContent;

    const draggedElem = document.getElementById("drag-" + draggedWord);
    if (!draggedElem) return;

    draggedElem.remove();

    if (draggedWord === correctWord) {
      defBox.classList.remove("incorrect");
      defBox.classList.add("correct");
      document.getElementById("chime").play();
      score++;
    } else {
      defBox.classList.remove("correct");
      defBox.classList.add("incorrect");
      document.getElementById("buzzer").play();
      const answer = document.createElement("div");
      answer.className = "answer";
      answer.draggable = true;
      answer.textContent = draggedWord;
      answer.id = "drag-" + draggedWord;
      answer.ondragstart = e => e.dataTransfer.setData("text/plain", draggedWord);
      document.getElementById("answers").appendChild(answer);
    }

    updateScore();
  }

  function updateScore() {
    document.getElementById("score").textContent = `Score: ${score}/12`;
  }

  function resetExercise() {
    createExercise();
  }

  window.onload = createExercise;
</script>

</body>
</html>
