<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>American vs British English – A2/B1 Vocabulary</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --us: #1a3a6b; --gb: #b22234; --us-light: #e8eef8; --gb-light: #f8e8ea;
    --gold: #d4af37; --cream: #fafafa; --dark: #2d3436;
    --correct: #27ae60; --wrong: #d63031; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); line-height: 1.6; }
  header { background: linear-gradient(135deg, var(--us) 0%, var(--gb) 100%); color: white; padding: 2rem; text-align: center; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 0.5rem; }
  .badge { background: var(--gold); color: white; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
  
  .tab-bar { display: flex; justify-content: center; background: #333; overflow-x: auto; }
  .tab-btn { background: none; border: none; color: #aaa; padding: 1rem; cursor: pointer; font-weight: bold; transition: 0.3s; }
  .tab-btn.active { color: var(--gold); border-bottom: 3px solid var(--gold); }

  .panel { display: none; padding: 1.5rem; max-width: 700px; margin: 0 auto; }
  .panel.active { display: block; }

  /* Table Style */
  .vocab-table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .vocab-table th { background: #eee; padding: 1rem; text-align: left; }
  .vocab-table td { padding: 0.8rem 1rem; border-bottom: 1px solid #eee; }
  .vocab-table td:first-child { color: var(--us); font-weight: bold; border-right: 1px solid #eee; }
  .vocab-table td:last-child { color: var(--gb); font-weight: bold; }

  /* Cards */
  .card { background: white; padding: 1.5rem; border-radius: var(--radius); box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 1rem; }
  .score-box { text-align: center; font-weight: bold; margin-bottom: 1rem; color: var(--us); }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1rem; }
  .choice-btn, .dialect-btn { padding: 0.8rem; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-weight: 500; transition: 0.2s; }
  .choice-btn:hover { border-color: var(--gold); }
  
  .correct { background: var(--correct) !important; color: white; border-color: var(--correct); }
  .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong); }
  
  .fill-input { padding: 0.5rem; border: 2px solid #ddd; border-radius: 5px; width: 100%; margin-top: 5px; }
  .retry-btn { display: block; width: 100%; padding: 1rem; background: var(--dark); color: white; border: none; border-radius: 8px; margin-top: 1rem; cursor: pointer; }
</style>
</head>
<body>

<header>
  <h1>🇺🇸 The Atlantic Bridge 🇬🇧</h1>
  <p>Everyday words, two different worlds.</p>
  <span class="badge">A2 - B1 Level</span>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="showPanel('list')">Word List</button>
  <button class="tab-btn" onclick="showPanel('ex1')">Quiz</button>
  <button class="tab-btn" onclick="showPanel('ex2')">Identify</button>
  <button class="tab-btn" onclick="showPanel('ex3')">Spelling</button>
</nav>

<div id="list" class="panel active">
  <table class="vocab-table">
    <thead><tr><th>American</th><th>British</th></tr></thead>
    <tbody id="list-body"></tbody>
  </table>
</div>

<div id="ex1" class="panel">
  <div class="score-box" id="ex1-score">Score: 0 / 10</div>
  <div id="ex1-content"></div>
</div>

<div id="ex2" class="panel">
  <div class="score-box" id="ex2-score">Score: 0 / 10</div>
  <div id="ex2-content"></div>
</div>

<div id="ex3" class="panel">
  <div class="score-box" id="ex3-score">Score: 0 / 10</div>
  <div id="ex3-content"></div>
  <button class="retry-btn" onclick="checkEx3()">Check Answers</button>
</div>

<script>
const vocab = [
  { us: "apartment", gb: "flat" }, { us: "elevator", gb: "lift" },
  { us: "trash", gb: "rubbish" }, { us: "subway", gb: "underground" },
  { us: "truck", gb: "lorry" }, { us: "gas", gb: "petrol" },
  { us: "cookie", gb: "biscuit" }, { us: "candy", gb: "sweets" },
  { us: "vacation", gb: "holiday" }, { us: "sidewalk", gb: "pavement" },
  { us: "soccer", gb: "football" }, { us: "fries", gb: "chips" },
  { us: "sweater", gb: "jumper" }, { us: "eraser", gb: "rubber" },
  { us: "closet", gb: "wardrobe" }, { us: "movie", gb: "film" },
  { us: "mail", gb: "post" }, { us: "flashlight", gb: "torch" },
  { us: "yard", gb: "garden" }, { us: "sneakers", gb: "trainers" },
  { us: "pants", gb: "trousers" }, { us: "chips", gb: "crisps" },
  { us: "drugstore", gb: "chemist" }, { us: "fall", gb: "autumn" }
];

const sentences = [
  { s: "We live in a small flat in London.", d: "GB" },
  { s: "I love eating cookies with milk.", d: "US" },
  { s: "Let's take the elevator to the 5th floor.", d: "US" },
  { s: "He is playing football in the park.", d: "GB" },
  { s: "Where is the nearest gas station?", d: "US" },
  { s: "I need to buy a new jumper for winter.", d: "GB" },
  { s: "The movie starts at 8 o'clock.", d: "US" },
  { s: "Watch out! The pavement is wet.", d: "GB" },
  { s: "Can you take out the trash?", d: "US" },
  { s: "I spent my holiday in Spain.", d: "GB" },
  { s: "The autumn leaves are falling.", d: "GB" },
  { s: "I bought new sneakers for gym class.", d: "US" }
];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
  if(id === 'ex1') initEx1();
  if(id === 'ex2') initEx2();
  if(id === 'ex3') initEx3();
}

// Populate List
const listBody = document.getElementById('list-body');
vocab.sort((a,b) => a.us.localeCompare(b.us)).forEach(v => {
  listBody.innerHTML += `<tr><td>${v.us}</td><td>${v.gb}</td></tr>`;
});

// Exercise 1: Multi-Choice
function initEx1() {
  const container = document.getElementById('ex1-content');
  container.innerHTML = '';
  const pool = shuffle([...vocab]).slice(0, 10);
  let score = 0;
  
  pool.forEach((q, i) => {
    const isUS = Math.random() > 0.5;
    const quest = isUS ? q.us : q.gb;
    const correct = isUS ? q.gb : q.us;
    
    // Distractors
    let distractors = shuffle(vocab.map(v => isUS ? v.gb : v.us))
                      .filter(w => w !== correct).slice(0, 3);
    const opts = shuffle([correct, ...distractors]);

    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<p><strong>${i+1}.</strong> What is the ${isUS ? 'British' : 'American'} word for <b>${quest}</b>?</p>
      <div class="choices">
        ${opts.map(o => `<button class="choice-btn" onclick="checkEx1(this, '${o}', '${correct}')">${o}</button>`).join('')}
      </div>`;
    container.appendChild(div);
  });

  window.checkEx1 = (btn, chosen, correct) => {
    const btns = btn.parentElement.querySelectorAll('button');
    btns.forEach(b => b.disabled = true);
    if(chosen === correct) {
      btn.classList.add('correct');
      score++;
    } else {
      btn.classList.add('wrong');
      btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
    }
    document.getElementById('ex1-score').innerText = `Score: ${score} / 10`;
  };
}

// Exercise 2: Identify Dialect
function initEx2() {
  const container = document.getElementById('ex2-content');
  container.innerHTML = '';
  const pool = shuffle([...sentences]).slice(0, 10);
  let score = 0;

  pool.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `<p>${item.s}</p>
      <div class="choices">
        <button class="dialect-btn" onclick="checkEx2(this, 'US', '${item.d}')">American</button>
        <button class="dialect-btn" onclick="checkEx2(this, 'GB', '${item.d}')">British</button>
      </div>`;
    container.appendChild(div);
  });

  window.checkEx2 = (btn, chosen, correct) => {
    const btns = btn.parentElement.querySelectorAll('button');
    btns.forEach(b => b.disabled = true);
    if(chosen === correct) {
      btn.classList.add('correct');
      score++;
    } else {
      btn.classList.add('wrong');
      btns.forEach(b => { if(b.innerText.includes(correct === 'US' ? 'American' : 'British')) b.classList.add('correct'); });
    }
    document.getElementById('ex2-score').innerText = `Score: ${score} / 10`;
  };
}

// Exercise 3: Fill Blanks
function initEx3() {
  const container = document.getElementById('ex3-content');
  container.innerHTML = '';
  const pool = shuffle([...vocab]).slice(0, 10);
  
  pool.forEach((v, i) => {
    const hideUS = Math.random() > 0.5;
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = hideUS ? 
      `<p>British: <b>${v.gb}</b></p><input class="fill-input" placeholder="Enter American word..." data-ans="${v.us}">` :
      `<p>American: <b>${v.us}</b></p><input class="fill-input" placeholder="Enter British word..." data-ans="${v.gb}">`;
    container.appendChild(div);
  });
}

function checkEx3() {
  let score = 0;
  const inputs = document.querySelectorAll('.fill-input');
  inputs.forEach(input => {
    if(input.value.trim().toLowerCase() === input.dataset.ans.toLowerCase()) {
      input.style.borderColor = 'var(--correct)';
      score++;
    } else {
      input.style.borderColor = 'var(--wrong)';
      input.value += ` (${input.dataset.ans})`;
    }
    input.disabled = true;
  });
  document.getElementById('ex3-score').innerText = `Score: ${score} / 10`;
}
</script>
</body>
</html>
