<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Match-Up</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ec;
    --card-bg: #ffffff;
    --primary: #f97316;
    --primary-light: #fff7ed;
    --green: #22c55e;
    --green-light: #f0fdf4;
    --red: #ef4444;
    --red-light: #fef2f2;
    --blue: #3b82f6;
    --blue-light: #eff6ff;
    --purple: #8b5cf6;
    --purple-light: #f5f3ff;
    --text: #1e1b4b;
    --muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 24px 16px 48px;
    color: var(--text);
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--primary);
    letter-spacing: 1px;
    line-height: 1.1;
  }

  header p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 1.05rem;
    font-weight: 600;
  }

  .score-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .score-pill {
    background: white;
    border-radius: 50px;
    padding: 8px 20px;
    font-weight: 800;
    font-size: 0.95rem;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .score-pill .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }

  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-blue { background: var(--blue); }

  .sections-wrapper {
    display: flex;
    flex-direction: column;
    gap: 32px;
    max-width: 820px;
    margin: 0 auto;
  }

  .section-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    box-shadow: var(--shadow);
    border: 2px solid transparent;
  }

  .section-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-icon {
    font-size: 1.5rem;
  }

  .match-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: start;
  }

  .col-header {
    font-weight: 800;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 4px;
    text-align: center;
  }

  .word-btn, .def-btn {
    width: 100%;
    border: 2.5px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s ease;
    background: white;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .word-btn {
    background: var(--primary-light);
    border-color: #fed7aa;
    color: #c2410c;
  }

  .word-btn:hover:not(:disabled), .def-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  }

  .word-btn.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    box-shadow: 0 4px 16px rgba(249,115,22,0.4);
    transform: translateY(-2px);
  }

  .def-btn.selected {
    background: var(--blue);
    border-color: var(--blue);
    color: white;
    box-shadow: 0 4px 16px rgba(59,130,246,0.4);
    transform: translateY(-2px);
  }

  .word-btn.correct, .def-btn.correct {
    background: var(--green);
    border-color: var(--green);
    color: white;
    cursor: default;
    transform: none;
    box-shadow: 0 4px 14px rgba(34,197,94,0.35);
  }

  .word-btn.wrong, .def-btn.wrong {
    background: var(--red);
    border-color: var(--red);
    color: white;
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .word-btn:disabled, .def-btn:disabled {
    cursor: default;
  }

  .word-btn.matched, .def-btn.matched {
    opacity: 0.55;
    cursor: default;
    transform: none;
  }

  .feedback-row {
    text-align: center;
    margin-top: 20px;
    min-height: 28px;
    font-weight: 700;
    font-size: 1rem;
    color: var(--muted);
    transition: all 0.2s;
  }

  .feedback-row.good { color: var(--green); }
  .feedback-row.bad { color: var(--red); }

  .reset-btn {
    display: block;
    margin: 12px auto 0;
    padding: 9px 24px;
    background: white;
    border: 2px solid var(--border);
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
  }

  .reset-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: var(--primary-light);
  }

  .congrats-box {
    display: none;
    text-align: center;
    margin-top: 36px;
    padding: 28px;
    background: linear-gradient(135deg, #fef9c3, #fde68a);
    border-radius: 20px;
    border: 3px solid #fbbf24;
    max-width: 820px;
    margin-left: auto;
    margin-right: auto;
    box-shadow: var(--shadow);
  }

  .congrats-box h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: #92400e;
    margin-bottom: 8px;
  }

  .congrats-box p {
    color: #78350f;
    font-weight: 700;
    font-size: 1.1rem;
  }

  .play-again-btn {
    margin-top: 18px;
    padding: 12px 32px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 4px 16px rgba(249,115,22,0.4);
  }

  .play-again-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(249,115,22,0.5);
  }

  @media (max-width: 500px) {
    .match-grid { gap: 8px; }
    .word-btn, .def-btn { font-size: 0.85rem; padding: 9px 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>🧩 Vocabulary Match-Up</h1>
  <p>Click a word, then click its definition!</p>
</header>

<div class="score-bar">
  <div class="score-pill"><span class="dot dot-green"></span> Correct: <span id="correct-count">0</span></div>
  <div class="score-pill"><span class="dot dot-red"></span> Wrong: <span id="wrong-count">0</span></div>
  <div class="score-pill"><span class="dot dot-blue"></span> Left: <span id="left-count">0</span></div>
</div>

<div class="sections-wrapper" id="sections-wrapper"></div>
<div class="congrats-box" id="congrats-box">
  <h2>🎉 Well done!</h2>
  <p>You matched all the words! Great work!</p>
  <button class="play-again-btn" onclick="initGame()">Play Again 🔄</button>
</div>

<script>
const sections = [
  {
    title: "Body Parts",
    icon: "💪",
    pairs: [
      { word: "wrist", def: "the joint between your hand and arm" },
      { word: "elbow", def: "the joint in the middle of your arm" },
      { word: "shoulder", def: "the joint at the top of your arm" },
      { word: "ankle", def: "the joint between your foot and leg" },
      { word: "knee", def: "the joint in the middle of your leg" },
    ]
  },
  {
    title: "Work Actions",
    icon: "🏭",
    pairs: [
      { word: "pick something up", def: "to lift something from the floor or a surface" },
      { word: "pack boxes", def: "to put things into boxes carefully" },
      { word: "load goods onto pallets", def: "to place products on a flat platform for moving" },
      { word: "cut the grass", def: "to make the grass shorter with a machine or tool" },
    ]
  },
  {
    title: "Numbers & Units",
    icon: "📐",
    pairs: [
      { word: "km/h", def: "kilometres per hour – how fast something moves" },
      { word: "metres", def: "a unit to measure length or distance" },
      { word: "1/2", def: "one half – one part of two equal parts" },
    ]
  },
  {
    title: "More Vocabulary",
    icon: "📚",
    pairs: [
      { word: "entertainment", def: "things that people enjoy watching or doing" },
      { word: "height", def: "how tall someone or something is" },
      { word: "standing", def: "being upright on your feet, not sitting" },
      { word: "folded up", def: "made smaller by bending parts together" },
      { word: "How heavy…?", def: "a question asking about the weight of something" },
    ]
  }
];

let correctCount = 0, wrongCount = 0;
let selectedWord = null, selectedWordEl = null;
let totalPairs = 0;
let matchedPairs = 0;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function updateScoreboard() {
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('wrong-count').textContent = wrongCount;
  document.getElementById('left-count').textContent = totalPairs - matchedPairs;
}

function initGame() {
  correctCount = 0; wrongCount = 0; matchedPairs = 0;
  totalPairs = sections.reduce((s, sec) => s + sec.pairs.length, 0);
  selectedWord = null; selectedWordEl = null;
  document.getElementById('congrats-box').style.display = 'none';
  updateScoreboard();

  const wrapper = document.getElementById('sections-wrapper');
  wrapper.innerHTML = '';

  sections.forEach((sec, sIdx) => {
    const card = document.createElement('div');
    card.className = 'section-card';

    const title = document.createElement('div');
    title.className = 'section-title';
    title.innerHTML = `<span class="section-icon">${sec.icon}</span> ${sec.title}`;
    card.appendChild(title);

    const headers = document.createElement('div');
    headers.className = 'match-grid';
    headers.innerHTML = `<div class="col-header">Word</div><div class="col-header">Definition</div>`;
    card.appendChild(headers);

    const grid = document.createElement('div');
    grid.className = 'match-grid';
    grid.style.gridTemplateColumns = '1fr 1fr';

    const words = shuffle(sec.pairs.map(p => p.word));
    const defs = shuffle(sec.pairs.map(p => p.def));

    const wordDefs = {}; // word -> def lookup
    sec.pairs.forEach(p => wordDefs[p.word] = p.def);
    const defWords = {}; // def -> word lookup
    sec.pairs.forEach(p => defWords[p.def] = p.word);

    // Create word column
    const wordCol = document.createElement('div');
    wordCol.style.display = 'flex';
    wordCol.style.flexDirection = 'column';
    wordCol.style.gap = '10px';

    words.forEach(w => {
      const btn = document.createElement('button');
      btn.className = 'word-btn';
      btn.textContent = w;
      btn.dataset.word = w;
      btn.dataset.type = 'word';
      btn.onclick = () => handleWordClick(w, btn, wordDefs, defWords, grid, feedback);
      wordCol.appendChild(btn);
    });

    // Create def column
    const defCol = document.createElement('div');
    defCol.style.display = 'flex';
    defCol.style.flexDirection = 'column';
    defCol.style.gap = '10px';

    defs.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'def-btn';
      btn.textContent = d;
      btn.dataset.def = d;
      btn.dataset.type = 'def';
      btn.onclick = () => handleDefClick(d, btn, wordDefs, defWords, wordCol, defCol, feedback);
      defCol.appendChild(btn);
    });

    grid.appendChild(wordCol);
    grid.appendChild(defCol);
    card.appendChild(grid);

    const feedback = document.createElement('div');
    feedback.className = 'feedback-row';
    card.appendChild(feedback);

    wrapper.appendChild(card);
  });
}

function clearWrongTimeout(el, origClass) {
  setTimeout(() => {
    if (el.classList.contains('wrong')) {
      el.classList.remove('wrong');
      el.className = origClass;
    }
  }, 600);
}

function handleWordClick(word, btn, wordDefs, defWords, grid, feedback) {
  if (btn.classList.contains('correct') || btn.classList.contains('matched')) return;

  // Deselect any previously selected word
  const prev = grid.querySelector('.word-btn.selected');
  if (prev && prev !== btn) {
    prev.classList.remove('selected');
    prev.className = 'word-btn';
  }

  if (btn.classList.contains('selected')) {
    btn.classList.remove('selected');
    selectedWord = null; selectedWordEl = null;
    return;
  }

  btn.classList.add('selected');
  selectedWord = word;
  selectedWordEl = btn;
  feedback.textContent = '';
  feedback.className = 'feedback-row';
}

function handleDefClick(def, btn, wordDefs, defWords, wordCol, defCol, feedback) {
  if (btn.classList.contains('correct') || btn.classList.contains('matched')) return;

  if (!selectedWord) {
    // Flash hint
    feedback.textContent = '👈 First, click a word on the left!';
    feedback.className = 'feedback-row';
    return;
  }

  const correctDef = wordDefs[selectedWord];

  if (def === correctDef) {
    // Correct match!
    selectedWordEl.classList.remove('selected');
    selectedWordEl.classList.add('correct');
    selectedWordEl.disabled = true;
    btn.classList.add('correct');
    btn.disabled = true;

    correctCount++;
    matchedPairs++;
    feedback.textContent = '✅ Correct! Great job!';
    feedback.className = 'feedback-row good';

    selectedWord = null; selectedWordEl = null;
    updateScoreboard();

    if (matchedPairs === totalPairs) {
      setTimeout(() => {
        document.getElementById('congrats-box').style.display = 'block';
        document.getElementById('congrats-box').scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 400);
    }
  } else {
    // Wrong!
    wrongCount++;
    feedback.textContent = '❌ Not quite — try again!';
    feedback.className = 'feedback-row bad';

    btn.classList.add('wrong');
    selectedWordEl.classList.add('wrong');

    setTimeout(() => {
      btn.classList.remove('wrong');
      selectedWordEl.classList.remove('wrong', 'selected');
      selectedWordEl.className = 'word-btn';
      selectedWord = null; selectedWordEl = null;
    }, 600);

    updateScoreboard();
  }
}

initGame();
</script>
</body>
</html>
